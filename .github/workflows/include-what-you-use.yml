name: Include What You Use

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  iwyu:
    name: Check includes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -qq git
          sudo apt-get install -qq gcc-14 g++-14
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 140
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-14 140
          sudo apt-get install -qq libhdf5-dev liblapack-dev liblapacke-dev libopenblas-dev libomp-dev
          sudo apt-get install -qq liblua5.4-dev
          sudo apt-get install -qq iwyu

      - name: Configure CMake
        run: >
          cmake -S "${{ github.workspace }}"
          -B "${{ github.workspace }}/build-iwyu"
          -DCMAKE_CXX_COMPILER=g++
          -DCMAKE_C_COMPILER=gcc
          -DCMAKE_BUILD_TYPE=Debug
          -DMACHINE=UBUNTU

      - name: Run include-what-you-use
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t sources < <(find "${{ github.workspace }}/src" -name '*.cpp' | sort)
          iwyu_tool.py -p "${{ github.workspace }}/build-iwyu" "${sources[@]}" 2>&1 | tee iwyu.log
          test ! -s iwyu.log
